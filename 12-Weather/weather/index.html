<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">


    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/small.css">
    <link rel="stylesheet" href="css/medium.css">
    <link rel="stylesheet" href="css/large.css">

</head>
<body>
    <header>
       <span id="city"></span>
       <span id="settings"><img src="images/settings.svg" alt="settings icon"></span>
    </header>
    <main>
        <section id="weatherInfo"></section>
        <aside>
            <p>Enter a new Zipcode in the USA: </p>
            <div id="form">
            <input type="number" id="zipcodeNew">
            <button id="zipcodeSubmit">Set a New Zipcode</button>
            </div>
        </aside>
    </main>
    <footer>
        <p>&copy; Ash Worthington &bull; 2026</p>
    </footer>

    <script src="js/scripts.js"></script>
</body>
</html>
